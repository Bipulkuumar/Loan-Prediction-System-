<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }
        button {
            padding: 10px;
            background-color: #2c7be5;
            color: white;
            border: none;
            width: 100%;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<h2>Loan Approval Prediction System</h2>

<form action="/predict" method="post">
    <input type="number" name="cibil" placeholder="CIBIL Score" required>
    <input type="number" name="income" placeholder="Annual Income" required>
    
    <select name="employment" required>
        <option value="1">Salaried</option>
        <option value="0">Self Employed</option>
    </select>

    <input type="number" name="loan_amount" placeholder="Loan Amount" required>
    <input type="number" name="tenure" placeholder="Loan Tenure (Years)" required>
    <input type="number" name="avg_balance" placeholder="Average Balance" required>
    <input type="number" name="emi" placeholder="Monthly EMI" required>
    <input type="number" name="transactions" placeholder="Monthly Transactions" required>

    <button type="submit">Predict</button>
</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
